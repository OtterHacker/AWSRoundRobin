- name: Install dependencies
  apt:
    name: "{{item}}"
    update_cache: yes
    state: present
  become: true
  become_user: root
  become_method: sudo
  connection: ssh
  loop:
    - openvpn

- name: Extract openvpn client configuration
  copy:
    src: "{{ playbook_dir }}/proxy.ovpn"
    dest: /etc/openvpn/proxy.conf
  become: true
  become_user: root
  become_method: sudo 

- name: Remove VPN Iptables rules
  ansible.builtin.service:
    name: openvpn-iptables
    state: stopped
    enabled: true
  become: true
  become_user: root
  become_method: sudo

- name: Change VPN nat rules
  shell: |
    sed -i 's/POSTROUTING .*/POSTROUTING -o tun1 -j MASQUERADE/g' /etc/systemd/system/openvpn-iptables.service
    systemctl daemon-reload
  become: true
  become_user: root
  become_method: sudo

- name: Load openvpn Iptables rules
  ansible.builtin.service:
    name: openvpn-iptables
    state: started
    enabled: true
  become: true
  become_user: root
  become_method: sudo

- name: Deploy OpenVPN dynamic routing
  copy:
    dest: /etc/openvpn/update-routing.sh
    mode: '0755'
    content: |
      #!/bin/bash

      if ! grep -q "100 tun0" /etc/iproute2/rt_tables; then
        echo "100 tun0" | tee -a /etc/iproute2/rt_tables
      fi

      ip rule del from 10.9.0.0/24 table tun0 2>/dev/null
      ip rule add from 10.9.0.0/24 table tun0

      ip route flush table tun0
      ip route add default dev "$dev" table tun0
      ip route flush cache

      iptables -t nat -D POSTROUTING -s 10.9.0.0/24 -o $dev -j MASQUERADE 2>/dev/null
      iptables -t nat -A POSTROUTING -s 10.9.0.0/24 -o $dev -j MASQUERADE

  become: true
  become_user: root
  become_method: sudo
  
- name: Add routing script to proxy.conf
  lineinfile:
    path: /etc/openvpn/proxy.conf
    line: "{{ item }}"
  loop:
    - "script-security 2"
    - "route-up /etc/openvpn/update-routing.sh"
    - "route-pre-down /etc/openvpn/update-routing.sh"
  become: true
  become_user: root
  become_method: sudo

- name: Start VPN client
  ansible.builtin.service:
    name: openvpn@proxy.service
    state: started
    enabled: true
  become: true
  become_user: root
  become_method: sudo
